name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Syntax check bin/run
        run: python3 -c "import ast; ast.parse(open('bin/run').read())"

      - name: Syntax check bin/wire
        run: bash -n bin/wire

      - name: bin/install exits 0 and links all 8 personas
        run: |
          bin/install /tmp/achtopus-install-test
          test "$(ls /tmp/achtopus-install-test/.claude/agents | wc -l)" -eq 8

      - name: Dry-run the example plans (zero API cost)
        run: |
          bin/run examples/plan.example.json --dry-run
          bin/run examples/prr-plan.example.json --dry-run
          bin/run examples/scope-guard.example.json --dry-run
